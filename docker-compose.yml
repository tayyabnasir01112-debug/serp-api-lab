services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: serp_api_lab_development
    ports:
      - "5432:5432"
    volumes:
      - serp-api-lab-db:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    command: bundle exec rails server -b 0.0.0.0
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/serp_api_lab_development
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY_BASE: development-secret
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: bundle exec sidekiq -C config/sidekiq.yml
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/serp_api_lab_development
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY_BASE: development-secret
    depends_on:
      - db
      - redis

volumes:
  serp-api-lab-db:
